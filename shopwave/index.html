<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ShopWave — Modern e-commerce product catalog with cart, filters, and search." />
  <meta name="keywords" content="shop, ecommerce, products, catalog" />
  <meta property="og:title" content="ShopWave — Modern Product Catalog" />
  <meta property="og:description" content="Browse and shop our curated product catalog." />
  <meta property="og:type" content="website" />
  <title>ShopWave — Product Catalog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header" role="banner">
    <div class="container header-inner">
      <a href="#/" class="logo" aria-label="ShopWave Home">🛍️ ShopWave</a>
      <nav aria-label="Primary navigation">
        <ul role="list">
          <li><a href="#/" class="nav-link" data-route="home">Home</a></li>
          <li><a href="#/shop" class="nav-link" data-route="shop">Shop</a></li>
          <li><a href="#/about" class="nav-link" data-route="about">About</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <button class="icon-btn" id="themeBtn" aria-label="Toggle theme">🌙</button>
        <button class="icon-btn cart-btn" id="cartBtn" aria-label="Open cart">
          🛒 <span class="cart-badge" id="cartBadge" aria-live="polite">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Router outlet -->
  <main id="app" role="main" tabindex="-1"></main>

  <!-- Cart drawer -->
  <div class="cart-backdrop" id="cartBackdrop" hidden aria-hidden="true"></div>
  <aside class="cart-drawer" id="cartDrawer" hidden aria-label="Shopping cart" role="complementary">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="icon-btn" id="cartClose" aria-label="Close cart">✕</button>
    </div>
    <ul class="cart-items" id="cartItems" role="list" aria-live="polite"></ul>
    <div class="cart-footer" id="cartFooter" hidden>
      <div class="cart-total">
        Total: <strong id="cartTotal"></strong>
      </div>
      <button class="btn-primary full" id="checkoutBtn">Checkout →</button>
    </div>
    <div class="cart-empty" id="cartEmpty">
      <span aria-hidden="true">🛒</span>
      <p>Your cart is empty</p>
    </div>
  </aside>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script src="data.js"></script>
  <script src="router.js"></script>
  <script src="cart.js"></script>
  <script src="app.js"></script>
</body>
</html>
