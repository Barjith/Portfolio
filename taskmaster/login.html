<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TaskMaster — Login or create an account." />
  <title>Login — TaskMaster</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <div class="auth-page">

    <div class="auth-brand">
      <span aria-hidden="true">⚡</span>
      <h1>TaskMaster</h1>
    </div>

    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs" role="tablist" aria-label="Login or Sign up">
        <button class="auth-tab active" id="loginTab" role="tab" aria-selected="true" aria-controls="loginPanel">Login</button>
        <button class="auth-tab" id="signupTab" role="tab" aria-selected="false" aria-controls="signupPanel">Sign Up</button>
      </div>

      <!-- Login form -->
      <div id="loginPanel" role="tabpanel" aria-labelledby="loginTab">
        <form id="loginForm" novalidate aria-label="Login form">
          <div class="auth-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" autocomplete="email" placeholder="your@email.com" required aria-required="true" />
            <span class="auth-error" id="loginEmailErr" role="alert" aria-live="polite"></span>
          </div>
          <div class="auth-group">
            <label for="loginPassword">Password</label>
            <div class="pass-wrap">
              <input type="password" id="loginPassword" autocomplete="current-password" placeholder="••••••••" required aria-required="true" />
              <button type="button" class="pass-toggle" aria-label="Show password">👁️</button>
            </div>
            <span class="auth-error" id="loginPasswordErr" role="alert" aria-live="polite"></span>
          </div>
          <div class="auth-alert" id="loginAlert" hidden role="alert" aria-live="assertive"></div>
          <button type="submit" class="btn-auth">Login →</button>
        </form>
      </div>

      <!-- Signup form -->
      <div id="signupPanel" role="tabpanel" aria-labelledby="signupTab" hidden>
        <form id="signupForm" novalidate aria-label="Sign up form">
          <div class="auth-group">
            <label for="signupName">Full Name</label>
            <input type="text" id="signupName" autocomplete="name" placeholder="Your name" required aria-required="true" />
            <span class="auth-error" id="signupNameErr" role="alert" aria-live="polite"></span>
          </div>
          <div class="auth-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" autocomplete="email" placeholder="your@email.com" required aria-required="true" />
            <span class="auth-error" id="signupEmailErr" role="alert" aria-live="polite"></span>
          </div>
          <div class="auth-group">
            <label for="signupPassword">Password</label>
            <div class="pass-wrap">
              <input type="password" id="signupPassword" autocomplete="new-password" placeholder="Min 6 characters" required aria-required="true" />
              <button type="button" class="pass-toggle" aria-label="Show password">👁️</button>
            </div>
            <span class="auth-error" id="signupPasswordErr" role="alert" aria-live="polite"></span>
          </div>
          <div class="auth-group">
            <label for="signupConfirm">Confirm Password</label>
            <div class="pass-wrap">
              <input type="password" id="signupConfirm" autocomplete="new-password" placeholder="Repeat password" required aria-required="true" />
              <button type="button" class="pass-toggle" aria-label="Show password">👁️</button>
            </div>
            <span class="auth-error" id="signupConfirmErr" role="alert" aria-live="polite"></span>
          </div>
          <div class="auth-alert" id="signupAlert" hidden role="alert" aria-live="assertive"></div>
          <button type="submit" class="btn-auth">Create Account →</button>
        </form>
      </div>

    </div>

  </div>

  <script src="auth.js"></script>
</body>
</html>
