<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TaskMaster — A state-driven task management app with full CRUD and local persistence." />
  <title>TaskMaster</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app" id="app">

    <header class="app-header">
      <div class="brand">
        <span aria-hidden="true">⚡</span>
        <h1>TaskMaster</h1>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center;">
        <span class="user-greeting" id="userGreeting"></span>
        <button class="icon-btn" id="themeBtn" aria-label="Toggle light/dark mode">🌙</button>
        <button class="icon-btn" id="logoutBtn" aria-label="Logout" title="Logout">🚪</button>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats-grid" role="status" aria-live="polite" aria-label="Task statistics">
      <div class="stat-card">
        <span class="stat-val" id="statTotal">0</span>
        <span class="stat-lbl">Total</span>
      </div>
      <div class="stat-card accent-active">
        <span class="stat-val" id="statActive">0</span>
        <span class="stat-lbl">Active</span>
      </div>
      <div class="stat-card accent-done">
        <span class="stat-val" id="statDone">0</span>
        <span class="stat-lbl">Done</span>
      </div>
    </div>

    <!-- Add / Edit form -->
    <form class="task-form" id="taskForm" aria-label="Add or edit a task">
      <div class="form-body">
        <input
          type="text" id="taskInput"
          placeholder="What needs to be done?"
          aria-label="Task title" autocomplete="off" maxlength="140"
          required
        />
        <textarea
          id="taskNote"
          placeholder="Add a note (optional)"
          aria-label="Task note" rows="2" maxlength="300"
        ></textarea>
        <div class="form-row">
          <select id="taskPriority" aria-label="Priority">
            <option value="low">🟢 Low</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="high">🔴 High</option>
          </select>
          <select id="taskCategory" aria-label="Category">
            <option value="general">📁 General</option>
            <option value="work">💼 Work</option>
            <option value="study">📚 Study</option>
            <option value="personal">👤 Personal</option>
          </select>
          <input type="date" id="taskDue" aria-label="Due date" />
          <button type="submit" class="btn-primary" id="submitBtn">Add Task</button>
        </div>
      </div>
    </form>

    <!-- Toolbar: search + filters -->
    <div class="toolbar">
      <div class="search-wrap">
        <span aria-hidden="true">🔍</span>
        <input type="search" id="searchInput" placeholder="Search tasks..." aria-label="Search tasks" />
      </div>
      <div class="filter-group" role="group" aria-label="Filter tasks">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Done</button>
      </div>
      <div class="sort-wrap">
        <select id="sortSelect" aria-label="Sort tasks">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="priority">By priority</option>
          <option value="due">By due date</option>
        </select>
      </div>
      <button class="btn-danger-sm" id="clearDone" aria-label="Clear all completed tasks">Clear Done</button>
    </div>

    <!-- Task list -->
    <main>
      <ul class="task-list" id="taskList" role="list" aria-label="Task list" aria-live="polite"></ul>
      <div class="empty" id="emptyState" hidden>
        <span aria-hidden="true">📭</span>
        <p>No tasks found. Add one above!</p>
      </div>
    </main>

  </div>

  <!-- Edit modal -->
  <div class="modal-backdrop" id="modalBackdrop" hidden aria-modal="true" role="dialog" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Edit Task</h2>
        <button class="icon-btn" id="modalClose" aria-label="Close edit dialog">✕</button>
      </div>
      <form id="editForm" aria-label="Edit task form">
        <div class="form-group">
          <label for="editInput">Title</label>
          <input type="text" id="editInput" required maxlength="140" />
        </div>
        <div class="form-group">
          <label for="editNote">Note</label>
          <textarea id="editNote" rows="3" maxlength="300"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="editPriority">Priority</label>
            <select id="editPriority">
              <option value="low">🟢 Low</option>
              <option value="medium">🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editCategory">Category</label>
            <select id="editCategory">
              <option value="general">📁 General</option>
              <option value="work">💼 Work</option>
              <option value="study">📚 Study</option>
              <option value="personal">👤 Personal</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editDue">Due date</label>
            <input type="date" id="editDue" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-outline" id="modalCancel">Cancel</button>
          <button type="submit" class="btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
